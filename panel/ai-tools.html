<div id="ai-tools-root">
  <div class="card">
    <h3>AI Tools</h3>
    <div class="field">
      <label><input type="checkbox" data-tool="web" /> Web Araması</label>
      <label><input type="checkbox" data-tool="files" /> Dosya/Knowledge Araması</label>
      <label><input type="checkbox" data-tool="image" /> Görsel Üretimi</label>
      <label><input type="checkbox" data-tool="video" /> Video Üretimi</label>
      <label><input type="checkbox" data-tool="tts" /> Ses Üretimi</label>
      <label><input type="checkbox" data-tool="dubbing" /> Dublaj</label>
      <label><input type="checkbox" data-tool="coding" /> Kodlama</label>
    </div>
  </div>

  <div class="card">
    <h3>Durum</h3>
    <div style="color:var(--muted); font-size:13px; line-height:1.45;">
      İhtiyacınız olan fonksiyonları seçebilirsiniz.<br />
      Seçimler sohbet bazında kaydedilir.
    </div>

    <div class="field">
      <label>Hızlı Model Seçim (5’li)</label>
      <div style="display:flex; flex-wrap:wrap; gap:8px;">
        <button class="pill" data-featured="mistralai/mistral-small-3.2-24b-instruct">Mistral Small</button>
        <button class="pill" data-featured="google/gemma-2-27b-it">Gemma 2</button>
        <button class="pill" data-featured="openai/gpt-5.1">GPT-5.1</button>
        <button class="pill" data-featured="x-ai/grok-4">Grok-4</button>
        <button class="pill" data-featured="openai/gpt-5.2-pro">GPT-5.2 Pro</button>
      </div>
      <div style="margin-top:8px; color:var(--muted); font-size:12px;">
        Desktop: sağ panel/topbar altı. Mobil: drawer/collapsible bölüm.
      </div>
    </div>

    <div class="field">
      <label>Hafıza</label>
      <button class="toggle" id="memoryToggle" aria-pressed="false" aria-label="Hafıza Açık/Kapalı" style="width:fit-content;">
        <span class="switch" aria-hidden="true"></span>
        <span id="memoryToggleText">Hafıza Kapalı</span>
      </button>
    </div>
  </div>
</div>
