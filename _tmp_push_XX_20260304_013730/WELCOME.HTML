<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPTR - Doğrulama Başarılı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #0F172A; 
            color: #FFFFFF;
            overflow: hidden;
        }
        
        .animated-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at top right, #1E293B, #0F172A);
        }

        .box-stack {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 500px;
            width: 100%;
        }

        .status-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 1.5rem 2rem;
            border-radius: 1.5rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
        }

        .status-box:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.05) translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* Giriş Animasyonları */
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .delay-1 { animation: fadeInUp 0.6s forwards 0.2s; }
        .delay-2 { animation: fadeInUp 0.6s forwards 0.4s; }
        .delay-3 { animation: fadeInUp 0.6s forwards 0.6s; }
        .delay-4 { animation: fadeInUp 0.6s forwards 0.8s; }
        .delay-5 { animation: fadeInUp 0.6s forwards 1.0s; }

        .glow-text {
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6" onclick="goToApp()">

    <div class="animated-bg"></div>

    <div class="box-stack">
        <!-- TEBRİKLER KUTUSU -->
        <div class="status-box delay-1 group">
            <span class="text-4xl block mb-2">🎉</span>
            <h2 class="text-3xl font-black tracking-tighter glow-text uppercase group-hover:text-emerald-400 transition-colors">TEBRİKLER</h2>
        </div>

        <!-- DOĞRULAMA KUTUSU -->
        <div class="status-box delay-2 border-emerald-500/20">
            <p class="text-lg font-bold text-slate-400 uppercase tracking-[0.2em]">DOĞRULAMAYI YAPTINIZ</p>
        </div>

        <!-- UYGULAMA KUTUSU -->
        <div class="status-box delay-3 bg-gradient-to-r from-blue-600/10 to-indigo-600/10">
            <p class="text-xl font-medium text-slate-200 uppercase tracking-widest">YAPAY ZEKA EVRENİNE</p>
        </div>

        <!-- GİTMEK KUTUSU -->
        <div class="status-box delay-4">
            <div class="flex items-center justify-center gap-4">
                <span class="w-12 h-[1px] bg-slate-700"></span>
                <p class="text-2xl font-light italic">Adım Atmak İçin</p>
                <span class="w-12 h-[1px] bg-slate-700"></span>
            </div>
        </div>

        <!-- TIKLAYIN KUTUSU (ASIL BUTON ETKİSİ) -->
        <div class="status-box delay-5 bg-white text-black border-none shadow-[0_0_50px_rgba(255,255,255,0.15)]">
            <div class="flex items-center justify-center gap-3">
                <span class="text-2xl font-black uppercase tracking-tighter">ŞİMDİ TIKLAYIN</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </div>
            <p class="text-[10px] font-bold opacity-50 mt-2 uppercase tracking-widest">500+ MODEL SİZİ BEKLİYOR</p>
        </div>
    </div>

    <!-- ALT BİLGİ -->
    <div class="fixed bottom-8 text-slate-500 text-[10px] font-bold uppercase tracking-[0.3em] opacity-40">
        ChatGPTR Premium Experience • 80 LLM & 500+ Model
    </div>

    <script>
        function goToApp() {
            // Karizmatik bir fade-out efekti ile yönlendir
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.5s ease';
            setTimeout(() => {
                window.location.href = 'app.html';
            }, 500);
        }

        // 5 saniye sonra hiçbir şey yapmazsa otomatik yönlendir
        setTimeout(() => {
            // goToApp(); // İstersen aktif edebilirsin
        }, 8000);
    </script>
</body>
</html>
